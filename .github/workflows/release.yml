name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=arm64  go build -o dist/lazyburn_darwin_arm64   .
          GOOS=darwin  GOARCH=amd64  go build -o dist/lazyburn_darwin_amd64   .
          GOOS=linux   GOARCH=amd64  go build -o dist/lazyburn_linux_amd64    .
          GOOS=linux   GOARCH=arm64  go build -o dist/lazyburn_linux_arm64    .
          GOOS=windows GOARCH=amd64  go build -o dist/lazyburn_windows_amd64.exe .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
